<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chef Noi — AI ผู้ช่วยสูตรอาหารไทย</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Sarabun', 'Noto Sans Thai', sans-serif;
    background: linear-gradient(135deg, #fff8f0 0%, #ffeedd 40%, #fff4e8 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #c0622055; border-radius: 4px; }

  /* Card */
  .chat-card {
    width: 100%; max-width: 680px;
    background: rgba(255,255,255,0.97);
    border: 1px solid rgba(192,98,32,0.2);
    border-radius: 24px;
    box-shadow: 0 16px 60px rgba(192,98,32,0.12);
    display: flex; flex-direction: column;
    height: 85vh; max-height: 760px;
    overflow: hidden;
  }

  /* Header */
  .chat-header {
    padding: 16px 20px;
    background: linear-gradient(135deg, rgba(192,98,32,0.08) 0%, rgba(160,60,0,0.05) 100%);
    border-bottom: 1px solid rgba(192,98,32,0.12);
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .header-avatar {
    width: 46px; height: 46px; border-radius: 50%;
    background: #eef2f8; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(27,58,107,0.2);
  }
  .header-avatar img { width: 82%; height: 82%; object-fit: contain; }
  .header-info { flex: 1; }
  .header-name { color: #c06220; font-weight: 700; font-size: 17px; }
  .header-sub { color: rgba(160,80,0,0.6); font-size: 13px; }
  .status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #4ade80; box-shadow: 0 0 8px #4ade80;
  }

  /* Messages */
  .messages {
    flex: 1; overflow-y: auto;
    padding: 16px 16px 8px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .msg-row {
    display: flex; align-items: flex-start; gap: 8px;
    animation: fadeUp 0.3s ease;
  }
  .msg-row.user { flex-direction: row-reverse; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .msg-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: #eef2f8; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 2px;
  }
  .msg-avatar img { width: 80%; height: 80%; object-fit: contain; }

  .msg-bubble {
    max-width: 75%;
    padding: 11px 15px;
    border-radius: 18px 18px 18px 4px;
    background: rgba(192,98,32,0.07);
    border: 1px solid rgba(192,98,32,0.15);
    color: #3a2010;
    font-size: 14.5px; line-height: 1.7;
  }
  .msg-row.user .msg-bubble {
    border-radius: 18px 18px 4px 18px;
    background: linear-gradient(135deg, #c06220, #e07830);
    border: none; color: #fff;
    box-shadow: 0 4px 16px rgba(192,98,32,0.25);
  }
  .msg-image {
    max-width: 200px; max-height: 160px;
    border-radius: 10px; display: block;
    margin-bottom: 6px; object-fit: cover;
  }

  /* Typing indicator */
  .typing { display: flex; align-items: center; gap: 5px; padding: 12px 16px; }
  .dot { width: 8px; height: 8px; background: #c06220; border-radius: 50%; animation: bounce 1.4s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

  /* Suggestions */
  .suggestions {
    padding: 0 16px 10px;
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .suggestion-btn {
    padding: 6px 14px;
    background: rgba(192,98,32,0.07);
    border: 1px solid rgba(192,98,32,0.25);
    border-radius: 20px; color: #c06220;
    font-size: 13px; font-family: inherit;
    cursor: pointer; transition: all 0.2s;
  }
  .suggestion-btn:hover { background: rgba(192,98,32,0.15); border-color: #c06220; }

  /* Image Preview */
  .image-preview-wrap {
    padding: 8px 16px 0;
    display: none;
  }
  .image-preview-wrap.show { display: block; }
  .image-preview-inner { position: relative; display: inline-block; }
  .image-preview-inner img {
    width: 68px; height: 68px; object-fit: cover;
    border-radius: 12px; border: 2px solid rgba(192,98,32,0.3);
    display: block;
  }
  .remove-img-btn {
    position: absolute; top: -6px; right: -6px;
    width: 20px; height: 20px; border-radius: 50%;
    background: #c06220; border: none; cursor: pointer;
    color: #fff; font-size: 11px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }

  /* Input area */
  .input-area {
    padding: 10px 16px 14px;
    border-top: 1px solid rgba(192,98,32,0.1);
    flex-shrink: 0;
  }
  .input-row { display: flex; gap: 8px; align-items: flex-end; }

  .icon-btn {
    width: 44px; height: 44px; border-radius: 12px;
    border: 1px solid rgba(192,98,32,0.22);
    background: rgba(192,98,32,0.06);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
  }
  .icon-btn:hover { background: rgba(192,98,32,0.14); border-color: #c06220; }
  .icon-btn svg { display: block; }

  #chat-input {
    flex: 1; padding: 11px 15px;
    background: rgba(255,255,255,0.95);
    border: 1px solid rgba(192,98,32,0.22);
    border-radius: 14px; color: #3a2010;
    font-size: 14.5px; font-family: inherit;
    outline: none; resize: none; line-height: 1.5;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #chat-input:focus { border-color: #c06220; box-shadow: 0 0 0 3px rgba(192,98,32,0.1); }
  #chat-input::placeholder { color: rgba(160,80,0,0.38); }

  .send-btn {
    height: 44px; padding: 0 20px;
    background: linear-gradient(135deg, #1b3a6b, #2a5298);
    border: 1px solid rgba(27,58,107,0.5);
    border-radius: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    gap: 7px; flex-shrink: 0;
    box-shadow: 0 4px 14px rgba(27,58,107,0.22);
    transition: all 0.2s;
  }
  .send-btn:hover { background: linear-gradient(135deg, #152d54, #1e3f7a); transform: translateY(-1px); box-shadow: 0 6px 18px rgba(27,58,107,0.32); }
  .send-btn:active { transform: translateY(0); }
  .send-btn:disabled { background: rgba(27,58,107,0.1); border-color: rgba(27,58,107,0.12); box-shadow: none; cursor: not-allowed; transform: none; }
  .send-btn span { color: #fff; font-family: inherit; font-weight: 600; font-size: 14px; }
  .send-btn:disabled span { color: rgba(27,58,107,0.35); }
  .send-btn svg { flex-shrink: 0; }

  /* Footer */
  .footer-text {
    margin-top: 12px; text-align: center;
    color: rgba(160,80,0,0.45); font-size: 12px;
  }

  /* Hidden inputs */
  input[type=file] { display: none; }
</style>
</head>
<body>

<div class="chat-card">
  <!-- Header -->
  <div class="chat-header">
    <div class="header-avatar">
      <img id="logo-img" src="" alt="Chef Noi">
    </div>
    <div class="header-info">
      <div class="header-name">Chef Noi</div>
      <div class="header-sub">AI ผู้ช่วยสูตรอาหารไทย • พร้อมช่วยเสมอ 🍜</div>
    </div>
    <div class="status-dot"></div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="msg-row">
      <div class="msg-avatar"><img id="bot-avatar" src="" alt="Chef Noi"></div>
      <div class="msg-bubble">สวัสดีครับ! ฉันคือ Chef Noi 🦁👨‍🍳 ผู้ช่วยสูตรอาหารไทยของคุณ<br><br>ถามได้เลยทุกเมนู หรือจะถ่ายรูปวัตถุดิบ/อาหาร ให้ฉันแนะนำสูตรก็ได้ครับ! 🍜🌶️</div>
    </div>
  </div>

  <!-- Suggestions -->
  <div class="suggestions" id="suggestions">
    <button class="suggestion-btn" onclick="sendSuggestion(this)">สูตรผัดไทยกุ้งสด</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">วิธีทำต้มยำกุ้งน้ำข้น</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">สูตรแกงเขียวหวานไก่</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">ทำข้าวผัดกะเพราอย่างไร</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">สูตรมะม่วงข้าวเหนียว</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">วิธีทำส้มตำปูปลาร้า</button>
  </div>

  <!-- Image Preview -->
  <div class="image-preview-wrap" id="preview-wrap">
    <div class="image-preview-inner">
      <img id="preview-img" src="" alt="preview">
      <button class="remove-img-btn" onclick="clearImage()">✕</button>
    </div>
  </div>

  <!-- Input Area -->
  <div class="input-area">
    <div class="input-row">
      <!-- Gallery -->
      <button class="icon-btn" onclick="document.getElementById('file-input').click()" title="แนบรูปจากคลัง">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#c06220" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </button>
      <!-- Camera -->
      <button class="icon-btn" onclick="document.getElementById('camera-input').click()" title="ถ่ายรูป">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#c06220" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </button>
      <textarea id="chat-input" rows="1" placeholder="ถามสูตรอาหาร หรือส่งรูปได้เลยครับ..."
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
        <span>ส่งข้อความ</span>
      </button>
    </div>
  </div>

  <input type="file" id="file-input" accept="image/*" onchange="handleImage(this)">
  <input type="file" id="camera-input" accept="image/*" capture="environment" onchange="handleImage(this)">
</div>

<div class="footer-text">Powered by Hanuman Prime • Chef Noi สูตรอาหารไทย</div>

const PROXY_URL = "https://script.google.com/a/macros/jdee.ai/s/AKfycbxbxBidOHKwrBOMTOBB1DDc2a8o3IFM3RKmXJksyd1A4p8Rm6aHArv6itfsFTO2VeC-Zw/exec";

const SYSTEM_PROMPT = `คุณคือ "Chef Noi" ผู้ช่วยสูตรอาหารไทยที่เชี่ยวชาญ คุณรู้จักอาหารไทยทุกประเภท ตั้งแต่อาหารภาคเหนือ ภาคกลาง ภาคอีสาน และภาคใต้

หน้าที่ของคุณ:
- แนะนำสูตรอาหารไทยพร้อมวิธีทำที่ละเอียด
- บอกรายการวัตถุดิบพร้อมปริมาณที่ชัดเจน
- แนะนำเคล็ดลับการทำให้อาหารอร่อย
- เมื่อได้รับรูปภาพ ให้วิเคราะห์ว่าเป็นอาหารหรือวัตถุดิบอะไร และแนะนำสูตร/วิธีทำ
- ตอบคำถามเกี่ยวกับโภชนาการของอาหารไทย

ตอบเป็นภาษาไทยเสมอ ใช้ภาษาที่เป็นมิตร อ่านง่าย
เมื่อให้สูตรอาหาร จัดรูปแบบดังนี้:
🥘 ชื่อเมนู
📝 วัตถุดิบ
👨‍🍳 วิธีทำ
💡 เคล็ดลับ`;

let messages = [];
let pendingImage = null;
let loading = false;

const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("chat-input");
const sendBtn = document.getElementById("send-btn");
const suggestionsEl = document.getElementById("suggestions");
const previewWrap = document.getElementById("preview-wrap");
const previewImg = document.getElementById("preview-img");

inputEl.addEventListener("input", () => {
  sendBtn.disabled = loading || (!inputEl.value.trim() && !pendingImage);
});

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) sendMessage();
  }
}

function handleImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const dataUrl = e.target.result;
    const base64 = dataUrl.split(",")[1];
    pendingImage = { base64, mediaType: file.type, preview: dataUrl };
    previewImg.src = dataUrl;
    previewWrap.classList.add("show");
    sendBtn.disabled = false;
  };
  reader.readAsDataURL(file);
  input.value = "";
}

function clearImage() {
  pendingImage = null;
  previewWrap.classList.remove("show");
  previewImg.src = "";
  sendBtn.disabled = !inputEl.value.trim();
}

function sendSuggestion(btn) {
  inputEl.value = btn.textContent;
  suggestionsEl.style.display = "none";
  sendMessage();
}

function addMessage(role, text, imageSrc) {
  const row = document.createElement("div");
  row.className = "msg-row" + (role === "user" ? " user" : "");

  let avatarHtml = "";
  if (role === "assistant") {
    avatarHtml = `<div class="msg-avatar"><img src="${LOGO_URL}" alt="Chef Noi"></div>`;
  }

  let imageHtml = imageSrc ? `<img src="${imageSrc}" class="msg-image" alt="รูปที่ส่ง">` : "";
  let textHtml = text ? text.replace(/\n/g, "<br>") : "";

  row.innerHTML = `${avatarHtml}<div class="msg-bubble">${imageHtml}${textHtml}</div>`;
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return row;
}

function addTyping() {
  const row = document.createElement("div");
  row.className = "msg-row";
  row.id = "typing-row";
  row.innerHTML = `<div class="msg-avatar"><img src="${LOGO_URL}" alt="Chef Noi"></div>
    <div class="msg-bubble"><div class="typing">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div></div>`;
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById("typing-row");
  if (el) el.remove();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  const image = pendingImage;
  if ((!text && !image) || loading) return;

  suggestionsEl.style.display = "none";
  loading = true;
  sendBtn.disabled = true;
  sendBtn.querySelector("span").textContent = "กำลังตอบ...";

  // Add user message
  addMessage("user", text, image ? image.preview : null);
  inputEl.value = "";
  inputEl.style.height = "auto";
  clearImage();

  // Build API message
  let userContent;
  if (image) {
    userContent = [
      { type: "text", text: text || "ช่วยดูรูปนี้ให้หน่อยครับ แนะนำสูตรอาหารหรือข้อมูลที่เกี่ยวข้องด้วยครับ" },
      { type: "image", source: { type: "base64", media_type: image.mediaType, data: image.base64 } }
    ];
  } else {
    userContent = text;
  }

  messages.push({ role: "user", content: userContent });
  addTyping();

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1024,
        system: SYSTEM_PROMPT,
        messages: messages.map(m => ({
          role: m.role,
          content: typeof m.content === "string" ? m.content : m.content
        }))
      })
    });

    const data = await res.json();
    const reply = data.content?.find(b => b.type === "text")?.text || "ขออภัยครับ เกิดข้อผิดพลาด";
    messages.push({ role: "assistant", content: reply });
    removeTyping();
    addMessage("assistant", reply);
  } catch {
    removeTyping();
    addMessage("assistant", "ขออภัยครับ เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้งนะครับ 🙏");
  }

  loading = false;
  sendBtn.disabled = false;
  sendBtn.querySelector("span").textContent = "ส่งข้อความ";
  inputEl.focus();
}
</script>
</body>
</html>
